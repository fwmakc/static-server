<!DOCTYPE html>
<html lang="<%= language || 'en' %>">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error</title>
</head>

<body>
  <h1>Error</h1>
  <p><%= message %></p>
  <% if (error && error.stack) { %>
    <pre><%= error.stack %></pre>
  <% } %>
</body>

</html>
