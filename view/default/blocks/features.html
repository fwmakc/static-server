<section class="section features" id="features">
  <div class="container">
    <h2 class="section__title"><%= lang('features_title') %></h2>
    <p class="section__subtitle"><%= lang('features_subtitle') %></p>
    <div class="features__grid">
      <% const features = lang('features', { returnObjects: true }); %>
      <% if (Array.isArray(features)) { %>
      <% features.forEach(f => { %>
      <div class="features__card">
        <div class="features__icon"><%= f.icon %></div>
        <h3 class="features__card-title"><%= f.title %></h3>
        <p class="features__card-text">
          <%= f.description %>
        </p>
      </div>
      <% }) %>
      <% } %>
    </div>
  </div>
</section>
